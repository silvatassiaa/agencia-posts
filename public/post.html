<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Gerado — Agência Posts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <script src="js/env.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="page">

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/dashboard.html" class="logo"><div class="logo-icon">✦</div>Agência Posts</a>
    <div class="nav-user">
      <span id="user-name"></span>
      <div class="avatar" id="user-avatar">?</div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
</nav>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-label">Menu</div>
    <a href="/dashboard.html" class="sidebar-link">🏠 Dashboard</a>
    <a href="/clients.html"   class="sidebar-link">👥 Clientes</a>
    <a href="/queue.html"     class="sidebar-link active">📋 Fila de Posts</a>
    <div class="sidebar-label mt-4">Conta</div>
    <a href="/settings.html"  class="sidebar-link">⚙️ Configurações</a>
  </aside>

  <main class="main-content" id="main-content">
    <div class="empty-state"><div class="spinner"></div><p>Carregando post...</p></div>
  </main>
</div>

<!-- Área de renderização dos slides (fora da tela) -->
<div id="slides-render-area" style="position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;"></div>

<div id="toast-container"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const sb = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  const queueId = new URLSearchParams(location.search).get('id');

  async function init() {
    let { data: { session } } = await sb.auth.getSession();
    if (!session) {
      const anon = await sb.auth.signInAnonymously();
      session = anon.data?.session;
    }
    if (!session) { window.location.href = '/login.html'; return; }
    const name = session.user.user_metadata?.name || session.user.email || 'Visitante';
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-avatar').textContent = (name[0] || '?').toUpperCase();

    if (!queueId) { window.location.href = '/queue.html'; return; }

    const { data: post } = await sb.from('post_queue')
      .select('*, clients(*), post_ideas(*)')
      .eq('id', queueId).single();

    if (!post || post.status !== 'done') { window.location.href = '/queue.html'; return; }

    renderPost(post);
  }

  function renderPost(post) {
    const copy   = post.copy || {};
    const client = post.clients;
    const idea   = post.post_ideas;
    const color  = client?.brand_colors?.primary || '#6366f1';

    document.title = `${idea?.title || 'Post'} — Agência Posts`;

    document.getElementById('main-content').innerHTML = `
      <div class="flex items-center justify-between mb-2">
        <div>
          <p class="text-sm text-muted mb-2">
            <a href="/queue.html" style="color:var(--muted)">← Fila</a> ·
            <a href="/briefing.html?client=${client?.id}" style="color:var(--muted)">${client?.business_name || ''}</a>
          </p>
          <h1>${idea?.title || 'Post gerado'}</h1>
          <div class="flex gap-2 items-center mt-2">
            <span class="badge badge-green">✅ Pronto</span>
            <span class="badge badge-purple">${idea?.format || 'post'}</span>
          </div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-primary" id="btn-gen-arts" onclick="startArtGeneration()">🎨 Gerar artes</button>
          <button class="btn btn-secondary" id="btn-download-all" onclick="downloadAll()" style="display:none">⬇️ Baixar todos</button>
          <button class="btn btn-secondary" onclick="copyCaption()">📋 Copiar caption</button>
        </div>
      </div>

      <hr class="divider">

      <!-- Progress -->
      <div id="art-progress" style="display:none" class="card mb-6">
        <div class="flex items-center justify-between mb-2">
          <span class="font-bold" id="art-progress-label">Preparando slides...</span>
          <span class="text-sm text-muted" id="art-progress-count">0 / 0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="art-progress-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="post-output">
        <!-- Slides -->
        <div>
          <h2 class="mb-4">🎨 Slides <span class="text-sm text-muted font-bold" id="slides-status">(clique em "Gerar artes")</span></h2>
          <div id="slides-preview" class="flex flex-col gap-3">
            ${(copy.slide_texts || []).map((t, i) => `
              <div class="card card-sm" style="border-left:4px solid ${color}">
                <div style="font-size:0.72rem;font-weight:800;color:${color};margin-bottom:6px">SLIDE ${i+1}</div>
                <div style="font-size:0.9rem">${t}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Copy -->
        <div class="copy-block">
          <h2 class="mb-4">✍️ Copy & Texto</h2>

          ${copy.caption ? `
          <div class="copy-field">
            <div class="flex items-center justify-between mb-2">
              <div class="copy-label">Caption</div>
              <button class="btn btn-ghost btn-sm" onclick="copyText('caption-text')">Copiar</button>
            </div>
            <div class="copy-text" id="caption-text">${copy.caption}</div>
          </div>` : ''}

          ${copy.cta ? `
          <div class="copy-field">
            <div class="copy-label">CTA</div>
            <div class="copy-text">${copy.cta}</div>
          </div>` : ''}

          ${copy.hashtags?.length ? `
          <div class="copy-field">
            <div class="flex items-center justify-between mb-2">
              <div class="copy-label">Hashtags</div>
              <button class="btn btn-ghost btn-sm" onclick="copyHashtags()">Copiar</button>
            </div>
            <div class="hashtags">
              ${copy.hashtags.map(h=>`<span class="hashtag">${h.startsWith('#')?h:'#'+h}</span>`).join('')}
            </div>
          </div>` : ''}

          ${copy.talking_points?.length ? `
          <div class="copy-field">
            <div class="copy-label">Pontos-chave</div>
            <ul style="list-style:none;display:flex;flex-direction:column;gap:8px">
              ${copy.talking_points.map(p=>`
                <li style="display:flex;gap:10px;font-size:0.9rem">
                  <span style="color:${color};flex-shrink:0">→</span><span>${p}</span>
                </li>`).join('')}
            </ul>
          </div>` : ''}

          <div class="flex gap-2 mt-4">
            <a href="/queue.html" class="btn btn-secondary">← Fila</a>
            <a href="/ideas.html?client=${client?.id}" class="btn btn-ghost">Ver mais ideias</a>
          </div>
        </div>
      </div>
    `;

    window._copy   = copy;
    window._client = client;
    window._idea   = idea;
    window._color  = color;
    window._artPngs = [];
  }

  // ── Geração de artes no browser ──────────────────────────────────────────

  window.startArtGeneration = async function() {
    const btn = document.getElementById('btn-gen-arts');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Gerando...';

    const copy   = window._copy;
    const client = window._client;
    const idea   = window._idea;
    const color  = window._color;
    const slides = buildSlides(copy, client, idea, color);
    const total  = slides.length;
    const area   = document.getElementById('slides-render-area');
    const prev   = document.getElementById('slides-preview');

    document.getElementById('art-progress').style.display = '';
    document.getElementById('art-progress-count').textContent = `0 / ${total}`;
    prev.innerHTML = '';

    const pngs = [];

    for (let i = 0; i < slides.length; i++) {
      document.getElementById('art-progress-label').textContent = `Renderizando slide ${i+1} de ${total}...`;
      document.getElementById('art-progress-fill').style.width = `${Math.round((i/total)*100)}%`;

      // Inject HTML into hidden div
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'width:540px;height:720px;overflow:hidden;';
      wrapper.innerHTML = slides[i];
      area.appendChild(wrapper);

      await new Promise(r => setTimeout(r, 500)); // wait for fonts

      const canvas = await html2canvas(wrapper, {
        width: 540, height: 720, scale: 2,
        useCORS: true, logging: false, backgroundColor: null,
      });

      area.removeChild(wrapper);

      const dataUrl = canvas.toDataURL('image/png');
      pngs.push(dataUrl);

      // Show thumbnail
      const div = document.createElement('div');
      div.style.cssText = 'border-radius:12px;overflow:hidden;border:1px solid var(--border);position:relative;';
      div.innerHTML = `
        <img src="${dataUrl}" style="width:100%;display:block" alt="Slide ${i+1}">
        <div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);color:white;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700">${i+1}</div>
        <a download="slide-${String(i+1).padStart(2,'0')}.png" href="${dataUrl}"
           style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);color:white;padding:4px 10px;border-radius:6px;font-size:12px;text-decoration:none;font-weight:600">⬇</a>
      `;
      prev.appendChild(div);

      document.getElementById('art-progress-count').textContent = `${i+1} / ${total}`;
    }

    window._artPngs = pngs;
    document.getElementById('art-progress-fill').style.width = '100%';
    document.getElementById('art-progress-label').textContent = `✅ ${total} slides prontos!`;
    document.getElementById('slides-status').textContent = `(${total} slides gerados)`;
    document.getElementById('btn-download-all').style.display = '';
    btn.innerHTML = '🔄 Regenerar'; btn.disabled = false;
    toast(`${total} slides prontos para download!`, 'success');
  };

  window.downloadAll = function() {
    (window._artPngs||[]).forEach((url, i) => {
      const a = document.createElement('a');
      a.href = url; a.download = `slide-${String(i+1).padStart(2,'0')}.png`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });
  };

  // ── Builder de HTML dos slides ──────────────────────────────────────────

  function buildSlides(copy, client, idea, color) {
    const bg      = client?.brand_colors?.secondary || '#111827';
    const light   = isLight(bg);
    const textCol = light ? '#1a1a1a' : '#ffffff';
    const muted   = light ? '#666666' : 'rgba(255,255,255,0.55)';
    const bgAlt   = light ? '#f0f0f0' : '#13131f';
    const handle  = client?.instagram_handle ? '@'+client.instagram_handle : '@'+(client?.business_name||'').toLowerCase().replace(/\s+/g,'');
    const fonts   = `<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">`;
    const base    = `*{margin:0;padding:0;box-sizing:border-box}body{width:540px;height:720px;overflow:hidden;font-family:'Poppins','Segoe UI',sans-serif}`;
    const texts   = copy.slide_texts || [];
    const total   = texts.length + 2;

    function dots(active) {
      return Array.from({length:Math.min(total,8)},(_,i)=>
        `<div style="width:${i===active?20:7}px;height:7px;border-radius:4px;background:${i===active?color:light?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.2)'}"></div>`
      ).join('');
    }

    const slides = [];

    // Slide 1 — Cover
    slides.push(`<html><head><meta charset="UTF-8">${fonts}<style>${base}body{background:${bg};display:flex;flex-direction:column}</style></head><body>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 28px 0">
        <span style="font-size:13px;font-weight:700;color:${textCol}">${handle}</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 28px;text-align:center">
        <div style="background:${color};color:#fff;font-size:10px;font-weight:800;padding:5px 14px;border-radius:18px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px">${idea?.theme||'Post'}</div>
        <div style="font-size:${(idea?.title||'').length>40?'26px':'32px'};font-weight:900;color:${textCol};line-height:1.15;margin-bottom:18px">${idea?.title||''}</div>
        <div style="width:44px;height:5px;background:${color};border-radius:3px;margin-bottom:18px"></div>
        <div style="font-size:14px;font-weight:500;color:${muted};line-height:1.5;max-width:400px">${idea?.hook||''}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 28px 16px">
        <div style="display:flex;gap:4px">${dots(0)}</div>
        <span style="font-size:10px;font-weight:600;color:${muted}">deslize →</span>
      </div>
    </body></html>`);

    // Content slides
    texts.forEach((text, idx) => {
      const even   = idx % 2 === 0;
      const sBg    = even ? bgAlt : bg;
      const sTc    = (even && light) ? '#1a1a1a' : textCol;
      const sMu    = (even && light) ? '#555' : muted;
      slides.push(`<html><head><meta charset="UTF-8">${fonts}<style>${base}body{background:${sBg};display:flex;flex-direction:column}</style></head><body>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 28px 0">
          <span style="font-size:13px;font-weight:700;color:${sTc}">${handle}</span>
          <span style="font-size:10px;font-weight:800;color:${color};border:1.5px solid ${color};padding:3px 10px;border-radius:18px">${String(idx+1).padStart(2,'0')} / ${String(texts.length).padStart(2,'0')}</span>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 28px">
          <div style="font-size:28px;font-weight:900;color:${sTc};line-height:1.2;margin-bottom:18px">${text}</div>
          <div style="width:44px;height:5px;background:${color};border-radius:3px"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 28px 16px">
          <div style="display:flex;gap:4px">${dots(idx+1)}</div>
          <span style="font-size:10px;color:${sMu}">${idx+2} / ${total}</span>
        </div>
      </body></html>`);
    });

    // CTA slide
    slides.push(`<html><head><meta charset="UTF-8">${fonts}<style>${base}body{background:${bg};display:flex;flex-direction:column}</style></head><body>
      <div style="width:100%;height:7px;background:${color}"></div>
      <div style="display:flex;align-items:center;padding:14px 28px 0">
        <span style="font-size:13px;font-weight:700;color:${textCol}">${handle}</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 28px;text-align:center">
        <div style="font-size:26px;font-weight:900;color:${textCol};line-height:1.2;margin-bottom:20px">${copy.cta||'O que você achou?'}</div>
        <div style="background:${color};border-radius:12px;padding:14px 28px;margin-bottom:18px">
          <div style="font-size:15px;font-weight:700;color:white">👇 Comenta aí embaixo</div>
        </div>
        <div style="font-size:12px;font-weight:600;color:${muted}">${client?.business_name||''}</div>
      </div>
      <div style="display:flex;justify-content:center;padding:12px 28px 14px">
        <div style="display:flex;gap:4px">${dots(total-1)}</div>
      </div>
      <div style="width:100%;height:7px;background:${color}"></div>
    </body></html>`);

    return slides;
  }

  function isLight(hex) {
    const c = (hex||'#000000').replace('#','');
    if (c.length < 6) return false;
    return (0.299*parseInt(c.substr(0,2),16)+0.587*parseInt(c.substr(2,2),16)+0.114*parseInt(c.substr(4,2),16)) > 128;
  }

  window.copyCaption = function() {
    const c = window._copy||{};
    const h = (c.hashtags||[]).map(h=>h.startsWith('#')?h:'#'+h).join(' ');
    navigator.clipboard.writeText((c.caption||'')+'\n\n'+h).then(()=>toast('Caption copiada!','success'));
  };
  window.copyText = function(id) {
    navigator.clipboard.writeText(document.getElementById(id).textContent.trim()).then(()=>toast('Copiado!','success'));
  };
  window.copyHashtags = function() {
    const h = (window._copy?.hashtags||[]).map(h=>h.startsWith('#')?h:'#'+h).join(' ');
    navigator.clipboard.writeText(h).then(()=>toast('Hashtags copiadas!','success'));
  };
  window.logout = async()=>{ await sb.auth.signOut(); window.location.href='/login.html'; };

  function toast(msg,type='info') {
    const c=document.getElementById('toast-container');
    const el=document.createElement('div');
    el.className=`toast ${type}`;
    el.innerHTML=`<span>${{success:'✅',error:'❌',info:'ℹ️'}[type]||''}</span><span>${msg}</span>`;
    c.appendChild(el); setTimeout(()=>el.remove(),4000);
  }

  init();
</script>
</body>
</html>
