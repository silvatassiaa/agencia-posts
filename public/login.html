<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Agência Posts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <script src="js/env.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">✦</div>
      <h1>Agência Posts</h1>
      <p>Plataforma de geração de conteúdo com IA</p>
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="flex gap-2 mb-6" style="border-bottom:1px solid var(--border); padding-bottom:16px;">
        <button class="btn btn-sm" id="tab-login" onclick="showTab('login')">Entrar</button>
        <button class="btn btn-ghost btn-sm" id="tab-signup" onclick="showTab('signup')">Criar conta</button>
      </div>

      <!-- Login form -->
      <form id="form-login" class="flex flex-col gap-4" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="label">E-mail</label>
          <input type="email" class="input" id="login-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="label">Senha</label>
          <input type="password" class="input" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="btn-login">
          Entrar
        </button>
        <p class="text-sm text-muted" style="text-align:center">
          <a href="#" onclick="showForgot()" style="color:var(--accent2)">Esqueci minha senha</a>
        </p>
      </form>

      <!-- Signup form -->
      <form id="form-signup" class="flex flex-col gap-4 hidden" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="label">Seu nome</label>
          <input type="text" class="input" id="signup-name" placeholder="Nome completo" required>
        </div>
        <div class="form-group">
          <label class="label">E-mail</label>
          <input type="email" class="input" id="signup-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="label">Senha</label>
          <input type="password" class="input" id="signup-password" placeholder="Mínimo 8 caracteres" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="btn-signup">
          Criar conta de admin
        </button>
        <p class="hint" style="text-align:center">
          A primeira conta criada recebe perfil de <strong>admin</strong> (agência).<br>
          Clientes são convidados dentro da plataforma.
        </p>
      </form>
    </div>

    <div class="auth-footer">
      Agência Posts · Powered by Claude AI
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const sb = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  // If already logged in, redirect
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/dashboard.html';
  });

  window.showTab = function(tab) {
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
    document.getElementById('tab-login').className  = tab === 'login'  ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
    document.getElementById('tab-signup').className = tab === 'signup' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
  };

  window.handleLogin = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.innerHTML = '<span class="spinner"></span> Entrando...';
    btn.disabled = true;

    const { error } = await sb.auth.signInWithPassword({
      email:    document.getElementById('login-email').value,
      password: document.getElementById('login-password').value,
    });

    if (error) {
      toast(error.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos' : error.message, 'error');
      btn.innerHTML = 'Entrar'; btn.disabled = false;
    } else {
      window.location.href = '/dashboard.html';
    }
  };

  window.handleSignup = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-signup');
    btn.innerHTML = '<span class="spinner"></span> Criando conta...';
    btn.disabled = true;

    const { error } = await sb.auth.signUp({
      email:    document.getElementById('signup-email').value,
      password: document.getElementById('signup-password').value,
      options:  { data: { name: document.getElementById('signup-name').value, role: 'admin' } }
    });

    if (error) {
      toast(error.message, 'error');
      btn.innerHTML = 'Criar conta de admin'; btn.disabled = false;
    } else {
      toast('Conta criada! Verifique seu e-mail.', 'success');
      showTab('login');
    }
  };

  window.showForgot = async function() {
    const email = document.getElementById('login-email').value;
    if (!email) { toast('Digite seu e-mail primeiro', 'error'); return; }
    await sb.auth.resetPasswordForEmail(email);
    toast('Link de recuperação enviado para ' + email, 'success');
  };

  function toast(msg, type='info') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${{success:'✅',error:'❌',info:'ℹ️'}[type]}</span><span>${msg}</span>`;
    c.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
</script>
</body>
</html>
