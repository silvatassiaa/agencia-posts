<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Agência Posts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <script src="js/env.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">✦</div>
      <h1>Agência Posts</h1>
      <p>Plataforma de geração de conteúdo com IA</p>
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="flex gap-2 mb-6" style="border-bottom:1px solid var(--border); padding-bottom:16px;">
        <button class="btn btn-sm btn-primary" id="tab-login" type="button">Entrar</button>
        <button class="btn btn-ghost btn-sm" id="tab-signup" type="button">Criar conta</button>
      </div>

      <!-- Login form -->
      <form id="form-login" class="flex flex-col gap-4">
        <div class="form-group">
          <label class="label">E-mail</label>
          <input type="email" class="input" id="login-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="label">Senha</label>
          <input type="password" class="input" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="btn-login">
          Entrar
        </button>
        <p class="text-sm text-muted" style="text-align:center">
          <a href="#" id="link-forgot" style="color:var(--accent2)">Esqueci minha senha</a>
        </p>
      </form>

      <!-- Signup form -->
      <form id="form-signup" class="flex flex-col gap-4 hidden">
        <div class="form-group">
          <label class="label">Seu nome</label>
          <input type="text" class="input" id="signup-name" placeholder="Nome completo" required>
        </div>
        <div class="form-group">
          <label class="label">E-mail</label>
          <input type="email" class="input" id="signup-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="label">Senha</label>
          <input type="password" class="input" id="signup-password" placeholder="Mínimo 8 caracteres" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="btn-signup">
          Criar conta
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Agência Posts · Powered by Claude AI
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  // Non-module script — runs synchronously, no async load issues

  const SUPABASE_URL      = window.SUPABASE_URL;
  const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;

  // Load Supabase via CDN
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  script.onload = function() {
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Redirect if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/dashboard.html';
    });

    // Tab switching
    document.getElementById('tab-login').addEventListener('click', () => showTab('login'));
    document.getElementById('tab-signup').addEventListener('click', () => showTab('signup'));

    // Login form
    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      btn.innerHTML = '<span class="spinner"></span> Entrando...';
      btn.disabled = true;

      const email    = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        toast(error.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos' : error.message, 'error');
        btn.innerHTML = 'Entrar';
        btn.disabled = false;
      } else {
        window.location.href = '/dashboard.html';
      }
    });

    // Signup form
    document.getElementById('form-signup').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-signup');
      btn.innerHTML = '<span class="spinner"></span> Criando...';
      btn.disabled = true;

      const name     = document.getElementById('signup-name').value;
      const email    = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { name, role: 'admin' } }
      });

      if (error) {
        toast(error.message, 'error');
        btn.innerHTML = 'Criar conta';
        btn.disabled = false;
      } else {
        toast('Conta criada! Verifique seu e-mail para confirmar.', 'success');
        showTab('login');
      }
    });

    // Forgot password
    document.getElementById('link-forgot').addEventListener('click', async function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      if (!email) { toast('Digite seu e-mail primeiro', 'error'); return; }
      await sb.auth.resetPasswordForEmail(email);
      toast('Link enviado para ' + email, 'success');
    });
  };
  document.head.appendChild(script);

  function showTab(tab) {
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
    document.getElementById('tab-login').className  = tab === 'login'  ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
    document.getElementById('tab-signup').className = tab === 'signup' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
  }

  function toast(msg, type) {
    type = type || 'info';
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const c  = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.innerHTML = '<span>' + (icons[type]||'') + '</span><span>' + msg + '</span>';
    c.appendChild(el);
    setTimeout(function() { el.remove(); }, 4000);
  }
</script>
</body>
</html>
